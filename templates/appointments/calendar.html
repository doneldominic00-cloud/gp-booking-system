{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Book an Appointment (Calendar)</h2>
<p class="text-muted">Click a slot to book it.</p>

<div id="calendar" class="bg-white p-3 rounded shadow-sm"></div>

<!-- Booking Modal -->
<div class="modal fade" id="reasonBox" tabindex="-1" aria-labelledby="reasonBoxLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reasonBoxLabel">Confirm Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="modal-slot-info" class="mb-3"></p>
        <label for="booking-reason" class="form-label">Reason for visit <span class="text-muted">(optional)</span></label>
        <textarea id="booking-reason" class="form-control" rows="3" maxlength="500" placeholder="e.g. persistent headache, annual check-up…"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="confirm-booking-btn">Book Appointment</button>
      </div>
    </div>
  </div>
</div>

<!-- FullCalendar (CDN) -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  // CSRF helper for Django POST
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + "=")) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
  const csrftoken = getCookie("csrftoken");

  document.addEventListener("DOMContentLoaded", function () {
    const calendarEl = document.getElementById("calendar");

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: "dayGridMonth",
      height: "auto",
      headerToolbar: {
        left: "prev,next today",
        center: "title",
        right: "dayGridMonth,timeGridWeek,timeGridDay"
      },
      eventTimeFormat: {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false  // Use 24-hour format
      },
      slotLabelFormat: {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false  // Use 24-hour format for time slots
      },

      events: function(info, successCallback, failureCallback) {
        const url = "{% url 'appointments:slots_feed' %}";
        
        fetch(url + '?start=' + info.startStr + '&end=' + info.endStr)
          .then(response => {
            return response.json();
          })
          .then(data => {
            successCallback(data);
          })
          .catch(error => {
            failureCallback(error);
          });
      },

      eventClick: function(info) {
        const slotId = info.event.id;
        const title = info.event.title;
        const start = info.event.start;

        const dateStr = start.toLocaleDateString('en-GB', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        const timeStr = start.toLocaleTimeString('en-GB', {
          hour: '2-digit', minute: '2-digit', hour12: false
        });

        document.getElementById('modal-slot-info').textContent = `${title} — ${dateStr} at ${timeStr}`;
        document.getElementById('booking-reason').value = '';

        const modal = new bootstrap.Modal(document.getElementById('reasonBox'));
        modal.show();

        document.getElementById('confirm-booking-btn').onclick = async function() {
          const reason = document.getElementById('booking-reason').value.trim();
          modal.hide();

          try {
            const res = await fetch(`/appointments/api/book/${slotId}/`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-CSRFToken": csrftoken },
              body: JSON.stringify({ reason: reason })
            });

            const data = await res.json();

            if (!res.ok || !data.ok) {
              alert(data.error || "Could not book slot.");
              return;
            }

            alert("Booked successfully!");
            calendar.refetchEvents();
          } catch (e) {
            alert("Network error while booking.");
          }
        };
      }
    });

    calendar.render();
  });
</script>

{% endblock %}
